spring.application.name=RenterzPaizza

spring.datasource.url=jdbc:mysql://localhost:3306/renterzpaiza
spring.datasource.username=root
spring.datasource.password=2118
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:change-this-jwt-secret-min-64-characters-change-this-jwt-secret}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}
twilio.whatsapp.number=${TWILIO_WHATSAPP_NUMBER:}
twilio.enabled=${TWILIO_ENABLED:false}
twilio.dry-run=${TWILIO_DRY_RUN:true}
app.public.base-url=${APP_PUBLIC_BASE_URL:}

payment.gateway.provider=${PAYMENT_GATEWAY_PROVIDER:RAZORPAY}
payment.gateway.enabled=${PAYMENT_GATEWAY_ENABLED:false}
payment.gateway.dry-run=${PAYMENT_GATEWAY_DRY_RUN:true}
payment.gateway.public-key=${PAYMENT_GATEWAY_PUBLIC_KEY:}
payment.gateway.secret-key=${PAYMENT_GATEWAY_SECRET_KEY:}
payment.gateway.base-url=${PAYMENT_GATEWAY_BASE_URL:}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
